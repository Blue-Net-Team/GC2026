system:
  serial_port: /dev/ttyS3      # 与主控通信的串口设备
  udp_interface: ''            # UDP 绑定网卡，空字符串表示所有网卡
  udp_port: 8080               # UDP 图传端口
  udp_target_ip: ''            # 预配置图传接收端 IP，空表示等待客户端 connect 握手（支持热加载）
  switch_pin: GPIO3-A3         # 运行模式拨码开关引脚
  switch_reverse: true         # 是否反转开关电平
  start_led_pin: GPIO3-A2      # main 模式指示 LED 引脚
  detecting_led_pin: GPIO3-A4  # 检测中指示 LED 引脚
  oled_i2c_port: 2             # OLED 的 I2C 总线号
  oled_i2c_address: 60         # OLED 的 I2C 地址（十进制，0x3C）
  camera_name: icspring camera # 摄像头名称，用 v4l2-ctl --list-devices 查看
color:
  R:
    centre: 0
    error: 12
    L_S: 89
    U_S: 255
    L_V: 29
    U_V: 255
  G:
    centre: 69
    error: 12
    L_S: 41
    U_S: 255
    L_V: 29
    U_V: 255
  B:
    centre: 108
    error: 7
    L_S: 70
    U_S: 255
    L_V: 37
    U_V: 255
color_ring:
  erode_iter: 1
  dilate_kernel_size: 5
  clahe_clip_limit: 0.8
  clahe_tile_size: 8
  hough_dp: 0.9
  hough_min_dist: 68
  hough_param1: 72
  hough_param2: 100
  min_radius: 54
  max_radius: 281
  expected_circles: 5
  morph_kernel_size: 3
  gaussian_kernel_size: 9
  gaussian_sigma: 1.5
  alpha: 4.4
  threshold_value: 69
min_material_area: 5940        # 物料轮廓最小面积（像素²）
max_material_area: 300000      # 物料轮廓最大面积（像素²）
need2cut_height: 0             # 识别时从画面底部裁掉的高度（像素）
target_angle: 46               # 目标偏航角（°），用于视觉定位补偿
